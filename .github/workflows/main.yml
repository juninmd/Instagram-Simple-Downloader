name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Package Extension
        run: |
          zip -r extension.zip . -x "*.git*" "node_modules/*" "tests/*" "test-results/*" "pnpm-lock.yaml" "eslint.config.mjs" ".github/*" "playwright.config.js" "web-ext-artifacts/*" "package.json" "*.md"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: extension.zip
